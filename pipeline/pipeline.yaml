pipeline:
  continuous_interval: 3600
  backoff_on_error: 300
  max_backoff_multiplier: 5

api:
  fetch_concurrency: 10
  slug_404_cooldown_hours: 24

cleanup:
  process_all: false
  parse_concurrency: 12
  chunk_size: 5000

embeddings:
  batch_size: 50
  parallel_batches: 1

discovery:
  enabled: true
  timeout: 300

health_check:
  enabled: true
  timeout: 10
