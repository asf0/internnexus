pipeline:
    continuous_interval: 21600
    backoff_on_error: 300
    max_backoff_multiplier: 5

api:
    fetch_concurrency: 10
    slug_404_cooldown_hours: 24

ingest:
    slug_chunk_size: 50
    upsert_batch_size: 1000

sync:
    min_total_sighting_ratio: 0.5
    min_source_sighting_ratio: 0.5
    min_stale_guard_count: 1000
    min_fetched_to_stale_ratio: 0.5
    sightings_retention_days: 7
    sightings_cleanup_batch_size: 50000
    sync_batch_size: 5000

cleanup:
    process_all: false
    parse_concurrency: 12
    chunk_size: 5000

embeddings:
    batch_size: 50
    parallel_batches: 1

classify:
    commit_batch_size: 200

retry:
    db_max_attempts: 3
    db_base_delay_seconds: 0.5
    db_max_delay_seconds: 4.0

discovery:
    enabled: false
    timeout: 15
    searxng_url: "http://searxng:8080"
    query_delay_seconds: 15.0
    max_pages: null
    countries:
        - "United States"
        - "Brazil"
        - "Korea"
        - "Ireland"
        - "Canada"
        - "United Kingdom"
        - "Germany"

health_check:
    enabled: true
    timeout: 10
