pipeline:
  continuous_interval: 21600
  backoff_on_error: 300
  max_backoff_multiplier: 5

api:
  fetch_concurrency: 10
  slug_404_cooldown_hours: 24

cleanup:
  process_all: false
  parse_concurrency: 12
  chunk_size: 5000

embeddings:
  batch_size: 50
  parallel_batches: 1

discovery:
  enabled: true
  timeout: 15
  searxng_url: "http://192.168.0.5:8080"
  query_delay_seconds: 0.25
  max_pages: null

health_check:
  enabled: true
  timeout: 10
