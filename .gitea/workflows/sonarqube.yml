name: SonarQube

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: docker
    container:
      image: python:3.12-slim
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y git curl unzip openjdk-17-jre-headless

      - name: Checkout
        run: |
          git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .
          git fetch --depth 1 origin ${{ gitea.sha }}
          git checkout --detach FETCH_HEAD

      - name: Install SonarScanner CLI
        run: |
          curl -fsSL -o /tmp/sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-8.0.1.6346-linux-x64.zip
          unzip -q /tmp/sonar-scanner.zip -d /opt
          ln -sf /opt/sonar-scanner-8.0.1.6346-linux-x64/bin/sonar-scanner /usr/local/bin/sonar-scanner

      - name: Validate Sonar env
        run: |
          test -n "$SONAR_HOST_URL" || (echo "SONAR_HOST_URL is not set" && exit 1)
          test -n "$SONAR_TOKEN" || (echo "SONAR_TOKEN is not set" && exit 1)
          test -n "$SONAR_PROJECT_KEY" || (echo "SONAR_PROJECT_KEY is not set" && exit 1)

      - name: Run SonarQube scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.projectName=internnexus \
            -Dsonar.sources=backend,frontend,pipeline \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.exclusions=**/.git/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/coverage/**,**/.pytest_cache/**,**/.mypy_cache/** \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN}
