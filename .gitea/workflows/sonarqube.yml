name: SonarQube

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: docker
    container:
      image: sonarsource/sonar-scanner-cli:latest
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Validate Sonar env
        run: |
          test -n "$SONAR_HOST_URL" || (echo "SONAR_HOST_URL is not set" && exit 1)
          test -n "$SONAR_TOKEN" || (echo "SONAR_TOKEN is not set" && exit 1)
          test -n "$SONAR_PROJECT_KEY" || (echo "SONAR_PROJECT_KEY is not set" && exit 1)

      - name: Run SonarQube scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.projectName=internnexus \
            -Dsonar.sources=backend,frontend,pipeline \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.exclusions=**/.git/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/coverage/**,**/.pytest_cache/**,**/.mypy_cache/** \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN}
