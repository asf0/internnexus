name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend CI
    runs-on: docker
    container:
      image: python:3.12-slim
    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      REDIS_URL: ${{ vars.REDIS_URL }}
      GREENHOUSE_API_URL: ${{ vars.GREENHOUSE_API_URL }}
      LEVER_API_URL: ${{ vars.LEVER_API_URL }}
      SIMPLIFY_JOBS_INTERN_URL: ${{ vars.SIMPLIFY_JOBS_INTERN_URL }}
      SIMPLIFY_JOBS_NEW_GRAD_URL: ${{ vars.SIMPLIFY_JOBS_NEW_GRAD_URL }}
    steps:
      - name: Install Git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        run: git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -e ./backend

      - name: Run backend import validation
        run: |
          cd backend
          if [ -f tests/test_import_chains.py ]; then
            pytest tests/test_import_chains.py -q
          else
            python -m compileall -q app
            python -c "
import sys
sys.path.insert(0, '.')
import app.main
import app.api.auth
import app.api.jobs
import app.api.matching
print('✓ backend import validation passed')
"
          fi

  frontend-ci:
    name: Frontend CI
    runs-on: docker
    container:
      image: oven/bun:1
    steps:
      - name: Install Git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        run: git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .

      - name: Install and build frontend
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run build

  deploy:
    needs: [backend-ci, frontend-ci]
    runs-on: docker
    container:
      image: docker:24-cli
    steps:
      - name: Install Git
        run: apk add --no-cache git curl

      - name: Checkout
        run: git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_CLASSIFICATION_URL=${{ vars.OLLAMA_CLASSIFICATION_URL }}
          EMBEDDING_PROVIDER=${{ vars.EMBEDDING_PROVIDER }}
          EMBEDDING_MODEL=${{ vars.EMBEDDING_MODEL }}
          CLASSIFICATION_MODEL=${{ vars.CLASSIFICATION_MODEL }}
          CLOUDFLARED_TOKEN=${{ secrets.CLOUDFLARED_TOKEN }}
          REDIS_URL=${{ vars.REDIS_URL }}
          GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GREENHOUSE_API_URL=${{ vars.GREENHOUSE_API_URL }}
          LEVER_API_URL=${{ vars.LEVER_API_URL }}
          SIMPLIFY_JOBS_INTERN_URL=${{ vars.SIMPLIFY_JOBS_INTERN_URL }}
          SIMPLIFY_JOBS_NEW_GRAD_URL=${{ vars.SIMPLIFY_JOBS_NEW_GRAD_URL }}
          NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}
          AUTH_URL=${{ vars.AUTH_URL }}
          BACKEND_URL=${{ vars.BACKEND_URL }}
          NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          OAUTH_ENCRYPTION_PUBLIC_KEY_B64=${{ secrets.OAUTH_ENCRYPTION_PUBLIC_KEY_B64 }}
          OAUTH_ENCRYPTION_PRIVATE_KEY_B64=${{ secrets.OAUTH_ENCRYPTION_PRIVATE_KEY_B64 }}
          EOF

      - name: Deploy with Docker Compose
        run: |
          set -e
          docker compose pull || true
          # Start stateful deps first.
          docker compose up -d db redis
          # Build and start web app services only.
          docker compose up -d --build backend frontend
          docker compose up -d cloudflared

      - name: Health Check
        run: |
          set -e
          sleep 20
          docker exec internnexus-backend curl -f http://localhost:8000/health
          docker exec internnexus-frontend curl -f http://localhost:3000/

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== docker compose ps ==="
          docker compose ps || true
          echo "=== backend logs ==="
          docker logs --tail 300 internnexus-backend || true
          echo "=== pipeline logs ==="
          docker logs --tail 300 internnexus-pipeline || true
          echo "=== frontend logs ==="
          docker logs --tail 200 internnexus-frontend || true
