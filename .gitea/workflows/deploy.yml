name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: docker
    container:
      image: docker:24-cli
    steps:
      - name: Install Git
        run: apk add --no-cache git curl

      - name: Checkout
        run: git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }}
          EMBEDDING_PROVIDER=${{ vars.EMBEDDING_PROVIDER }}
          EMBEDDING_MODEL=${{ vars.EMBEDDING_MODEL }}
          VISA_CLASSIFIER_MODEL=${{ vars.VISA_CLASSIFIER_MODEL }}
          CLOUDFLARED_TOKEN=${{ secrets.CLOUDFLARED_TOKEN }}
          REDIS_URL=${{ vars.REDIS_URL }}
          GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GREENHOUSE_API_URL=${{ vars.GREENHOUSE_API_URL }}
          LEVER_API_URL=${{ vars.LEVER_API_URL }}
          SIMPLIFY_JOBS_INTERN_URL=${{ vars.SIMPLIFY_JOBS_INTERN_URL }}
          SIMPLIFY_JOBS_NEW_GRAD_URL=${{ vars.SIMPLIFY_JOBS_NEW_GRAD_URL }}
          NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}
          AUTH_URL=${{ vars.AUTH_URL }}
          BACKEND_URL=${{ vars.BACKEND_URL }}
          NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          OAUTH_ENCRYPTION_PUBLIC_KEY_B64=${{ secrets.OAUTH_ENCRYPTION_PUBLIC_KEY_B64 }}
          OAUTH_ENCRYPTION_PRIVATE_KEY_B64=${{ secrets.OAUTH_ENCRYPTION_PRIVATE_KEY_B64 }}
          EOF

      - name: Deploy with Docker Compose
        run: |
          docker compose pull || true
          docker compose up -d --build backend frontend pipeline
          docker compose up -d db redis cloudflared

      - name: Health Check
        run: |
          sleep 15
          docker exec internnexus-backend curl -f http://localhost:8000/health || exit 1
          docker exec internnexus-frontend curl -f http://localhost:3000/ || exit 1
