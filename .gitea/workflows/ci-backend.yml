name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**/*.py'
      - 'pipeline/**/*.py'
      - 'pyproject.toml'
      - '.gitea/workflows/ci-backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**/*.py'
      - 'pipeline/**/*.py'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: docker
    container:
      image: python:3.12-slim
    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      REDIS_URL: ${{ vars.REDIS_URL }}
      GREENHOUSE_API_URL: ${{ vars.GREENHOUSE_API_URL }}
      LEVER_API_URL: ${{ vars.LEVER_API_URL }}
      SIMPLIFY_JOBS_INTERN_URL: ${{ vars.SIMPLIFY_JOBS_INTERN_URL }}
      SIMPLIFY_JOBS_NEW_GRAD_URL: ${{ vars.SIMPLIFY_JOBS_NEW_GRAD_URL }}
    steps:
      - name: Install Git
        run: apt-get update && apt-get install -y git libatomic1

      - name: Checkout
        run: |
          git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .
          git fetch --depth 1 origin ${{ gitea.sha }}
          git checkout --detach FETCH_HEAD

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ./backend[dev]

      - name: Lint Python (ruff)
        run: uvx ruff check backend/ pipeline/

      - name: Type check Python (pyright)
        run: uvx pyright backend/ pipeline/

      - name: Run unit tests
        run: cd backend && uv run pytest tests/unit/ -q --tb=short

      - name: Run import validation
        run: cd backend && uv run pytest tests/test_import_chains.py -q
