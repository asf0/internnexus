name: Import Chain Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**/*.py'
      - 'pyproject.toml'
      - 'pipeline/**/*.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**/*.py'
      - 'pyproject.toml'
      - 'pipeline/**/*.py'

jobs:
  import-chain-tests:
    name: Import Chain Tests
    runs-on: docker
    container:
      image: python:3.12-slim
    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      REDIS_URL: ${{ vars.REDIS_URL }}
      GREENHOUSE_API_URL: ${{ vars.GREENHOUSE_API_URL }}
      LEVER_API_URL: ${{ vars.LEVER_API_URL }}
      SIMPLIFY_JOBS_INTERN_URL: ${{ vars.SIMPLIFY_JOBS_INTERN_URL }}
      SIMPLIFY_JOBS_NEW_GRAD_URL: ${{ vars.SIMPLIFY_JOBS_NEW_GRAD_URL }}
    steps:
      - name: Install Git
        run: apt-get update && apt-get install -y git
      
      - name: Checkout code
        run: git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -e ./backend

      - name: Verify import-chain test file exists
        run: |
          set -e
          test -f backend/tests/test_import_chains.py || (echo "Missing backend/tests/test_import_chains.py" && exit 1)
          pwd
          ls -la backend/tests | head -n 50
      
      - name: Run import chain tests
        run: pytest backend/tests/test_import_chains.py -v
      
      - name: Check for circular imports
        run: |
          python -c "
          import sys
          sys.setrecursionlimit(50)
          sys.path.insert(0, 'backend')
          import app.main
          print('✓ No circular imports detected')
          "
      
      - name: Validate entry points
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'backend')
          import app.main
          print('✓ main.py imports cleanly')
          "
