name: Import Chain Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  import-chain-tests:
    name: Import Chain Tests
    runs-on: docker
    container:
      image: python:3.12-slim
    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      REDIS_URL: ${{ vars.REDIS_URL }}
      GREENHOUSE_API_URL: ${{ vars.GREENHOUSE_API_URL }}
      LEVER_API_URL: ${{ vars.LEVER_API_URL }}
      SIMPLIFY_JOBS_INTERN_URL: ${{ vars.SIMPLIFY_JOBS_INTERN_URL }}
      SIMPLIFY_JOBS_NEW_GRAD_URL: ${{ vars.SIMPLIFY_JOBS_NEW_GRAD_URL }}
    steps:
      - name: Install Git
        run: apt-get update && apt-get install -y git

      - name: Checkout code
        run: git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -e ./backend

      - name: CI diagnostics
        run: |
          pwd
          python --version
          ls -la

      - name: Run import-chain tests
        run: |
          cd backend
          if [ -f tests/test_import_chains.py ]; then
            pytest tests/test_import_chains.py -q
          else
            python -m compileall -q app
            python -c "import sys; sys.path.insert(0, '.'); import app.main, app.api.auth, app.api.jobs, app.api.matching; print('backend import validation passed')"
          fi

      - name: Check import smoke
        run: |
          python -c "import sys; sys.path.insert(0, 'backend'); import app.main, app.api.auth, app.api.jobs, app.api.matching; print('No circular imports detected')"

      - name: Validate entry points
        run: |
          python -c "import sys; sys.path.insert(0, 'backend'); import app.main; print('main.py imports cleanly')"
