name: Import Chain Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**/*.py'
      - 'pyproject.toml'
      - 'pipeline/**/*.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**/*.py'
      - 'pyproject.toml'
      - 'pipeline/**/*.py'

jobs:
  import-chain-tests:
    name: Import Chain Tests
    runs-on: docker
    container:
      image: python:3.12-slim
    env:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: test-embedding-model
      OLLAMA_BASE_URL: http://localhost:11434
      AUTH_SECRET: test_auth_secret_minimum_32_chars_long
      REDIS_URL: redis://localhost:6379/0
      GREENHOUSE_API_URL: https://boards-api.greenhouse.io/v1/boards
      LEVER_API_URL: https://api.lever.co/v0/postings
      SIMPLIFY_JOBS_INTERN_URL: https://example.com/intern
      SIMPLIFY_JOBS_NEW_GRAD_URL: https://example.com/new-grad
    steps:
      - name: Install Git
        run: apt-get update && apt-get install -y git
      
      - name: Checkout code
        run: git clone --depth 1 ${{ gitea.server_url }}/${{ gitea.repository }} .
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -e ./backend
      
      - name: Run import chain tests
        run: pytest tests/test_import_chains.py -v
        working-directory: backend
      
      - name: Check for circular imports
        run: |
          python -c "
          import sys
          sys.setrecursionlimit(50)
          sys.path.insert(0, 'backend')
          import app.main
          print('✓ No circular imports detected')
          "
      
      - name: Validate entry points
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'backend')
          import app.main
          print('✓ main.py imports cleanly')
          "
